<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOTP</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;outline:none;border-radius:0!important}
::-webkit-scrollbar{display:none!important}
html,body,main,section{scrollbar-width:none!important;-ms-overflow-style:none!important}
html,body{height:100%;overflow:hidden;background:#faf7f2;color:#262626;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
main{display:grid;grid-template-columns:22rem 1fr;height:100vh;width:100%;overflow:hidden}
header{display:flex;flex-direction:column;justify-content:center;height:100vh;padding:0 3rem 0 5rem;gap:2.5rem;background:#faf7f2;z-index:10}
h1{font-size:1.25rem;font-weight:500;color:#262626;letter-spacing:.05em}
form,fieldset{display:flex;flex-direction:column}
form{gap:1.5rem;width:100%}
fieldset{border:none;gap:1.25rem}
input{font-size:.85rem;color:#262626;padding:.5rem 0;background:transparent;border:none;border-bottom:1px solid #e3ded7;width:100%;transition:border-color .2s}
input:focus{border-bottom-color:#262626}
input::placeholder{color:#a39f98;text-transform:uppercase;letter-spacing:.05em;font-size:.7rem}
button{background:transparent;border:none;cursor:pointer}
button[type=submit]{font-size:.75rem;font-weight:500;text-transform:uppercase;color:#faf7f2;background:#262626;padding:.75rem;width:100%;letter-spacing:.1em;transition:background .2s}
button[type=submit]:hover{background:#3d3d3d}
button[type=submit]:active{background:#1a1a1a}
#vault{overflow-y:auto;height:100vh;padding:6rem 5rem 6rem 0;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem;align-content:start}
#vault.empty{display:flex;align-items:center;justify-content:center;padding:0 5rem 0 0}
.placeholder{font-size:.7rem;color:#a39f98;text-transform:uppercase;letter-spacing:.2em;line-height:2.5;text-align:center}
article{border:1px solid #ede9e2;padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;min-height:7rem}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
h2{font-size:.75rem;font-weight:500;color:#7c7975;word-break:break-all;padding-right:.5rem;text-transform:uppercase;letter-spacing:.05em}
.remove-btn{font-size:.85rem;color:#a39f98;line-height:1;transition:color .2s}
.remove-btn:hover{color:#262626}
output{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:1.4rem;color:#262626;letter-spacing:.05em;display:block;cursor:pointer;transition:color .2s}
output:hover{color:#7c7975}
progress{-webkit-appearance:none;appearance:none;width:100%;height:1px;border:none;background:#ede9e2;margin-top:auto}
progress::-webkit-progress-bar{background:#ede9e2}
progress::-webkit-progress-value,progress::-moz-progress-bar{background:#262626;transition:width 1s linear}
@media (max-width:56rem){
main{grid-template-columns:1fr;height:auto;overflow:auto}
header{height:auto;padding:5rem 2rem 2rem;gap:2rem}
#vault{height:auto;overflow-y:visible;padding:2rem}
#vault.empty{padding:4rem 2rem;min-height:15rem}
}
</style>
</head>
<body>
<main>
  <header>
    <h1>TOTP</h1>
    <form id="creator" autocomplete="off">
      <fieldset>
        <input type="text" id="acc-name" required placeholder="Account">
        <input type="text" id="acc-secret" required placeholder="Secret">
      </fieldset>
      <button type="submit">Add</button>
    </form>
  </header>
  <section id="vault"></section>
</main>
<script>
const decodeMap=new Map([..."ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"].map((e,t)=>[e,t])),
      keyCache=new Map(),
      timeBuffer=new ArrayBuffer(8),
      timeView=new DataView(timeBuffer),
      vault=document.getElementById("vault");
let storageData=JSON.parse(localStorage.getItem("local_totp_keys")||"[]").filter(e=>e?.name&&e?.secret),
    lastTimeIndex=-1;

function decode32(e){
  e=e.replace(/=+$/,"").replace(/\s/g,"").toUpperCase();
  let t=new Uint8Array(Math.ceil(e.length*5/8)),a=0,r=0,n=0;
  for(let c of e){
    let o=decodeMap.get(c);
    if(void 0===o)throw new Error;
    r=r<<5|o,(a+=5)>=8&&(t[n++]=(r>>>(a-=8))&255)
  }
  return t.slice(0,n)
}

async function getCryptoKey(e){
  return keyCache.has(e)||keyCache.set(e,await crypto.subtle.importKey("raw",decode32(e),{name:"HMAC",hash:"SHA-1"},!1,["sign"])),keyCache.get(e)
}

async function computeOtp(e,t){
  try{
    timeView.setUint32(4,t,!1);
    const a=new Uint8Array(await crypto.subtle.sign("HMAC",await getCryptoKey(e),timeBuffer)),
          r=a[19]&15,
          n=(127&a[r])<<24|(255&a[r+1])<<16|(255&a[r+2])<<8|255&a[r+3];
    return(n%1e6).toString().padStart(6,"0")
  }catch{return"ERROR"}
}

function sync(){
  localStorage.setItem("local_totp_keys",JSON.stringify(storageData)),
  storageData.length?
    (vault.classList.remove("empty"),vault.innerHTML=storageData.map((e,t)=>`<article><div class="card-top"><h2>${e.name.replace(/[&<>"']/g,e=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[e])}</h2><button type="button" class="remove-btn" data-id="${t}">✕</button></div><output class="copy-trigger">--- ---</output><progress max="30" value="30"></progress></article>`).join("")):
    (vault.classList.add("empty"),vault.innerHTML='<p class="placeholder">No accounts registered<br>Enter a secret key to begin</p>'),
  lastTimeIndex=-1,tick()
}

async function tick(){
  if(!storageData.length)return;
  const e=Math.floor(Date.now()/1e3),t=Math.floor(e/30),a=30-e%30,r=t!==lastTimeIndex;
  for(let n=0;n<storageData.length;n++){
    const c=vault.children[n];
    if(!c||"ARTICLE"!==c.tagName)continue;
    const o=c.querySelector("output");
    if(r){
      const e=await computeOtp(storageData[n].secret,t);
      o.dataset.pin=e,"COPIED"!==o.textContent&&(o.textContent="ERROR"===e?e:`${e.slice(0,3)} ${e.slice(3)}`)
    }
    c.querySelector("progress").value=a
  }
  lastTimeIndex=t
}

document.getElementById("creator").addEventListener("submit",e=>{
  e.preventDefault();
  const t=document.getElementById("acc-name").value.trim(),a=document.getElementById("acc-secret").value.replace(/\s/g,"");
  try{decode32(a),storageData.push({name:t,secret:a}),sync(),e.target.reset()}catch{alert("Invalid base32 key")}
}),

vault.addEventListener("click",async e=>{
  if("remove-btn"===e.target.className&&confirm("Delete?"))storageData.splice(e.target.dataset.id,1),sync();
  else if("copy-trigger"===e.target.className&&e.target.dataset.pin&&"ERROR"!==e.target.dataset.pin)try{
    await navigator.clipboard.writeText(e.target.dataset.pin);
    const t=e.target.textContent;
    e.target.textContent="COPIED",setTimeout(()=>"COPIED"===e.target.textContent&&(e.target.textContent=t),800)
  }catch{}
}),

sync(),setInterval(tick,1e3);
</script>
</body>
</html>
